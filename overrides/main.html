{% extends "base.html" %}

{% block extrahead %}
<style>
  /* Inline critical CSS - hides content before external CSS loads */
  .md-header,.md-main,.md-footer,.md-sidebar,.md-tabs{display:none!important}
  body.authenticated .md-header,body.authenticated .md-main,body.authenticated .md-footer,body.authenticated .md-sidebar,body.authenticated .md-tabs{display:initial!important}
  body.authenticated .md-header{display:flex!important}
</style>
{% endblock %}

{% block announce %}
<div id="password-gate">
  <div class="gate-box">
    <h2>20,000 BC</h2>
    <p>Enter the password to access this documentation.</p>
    <input type="password" id="gate-password" placeholder="Password" autofocus />
    <button id="gate-submit">Enter</button>
    <div class="error" id="gate-error"></div>
  </div>
</div>
<script>
// To change password: echo -n "newpass" | shasum -a 256
// Current password: 20kbc2026
(function(){
  var H="235773a3b1d2087c7296c69e9847482e728ae4215beff65511d90339f077f64e";
  var K="20kbc_auth";
  function sha256(m){
    return crypto.subtle.digest("SHA-256",new TextEncoder().encode(m))
      .then(function(b){return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0")}).join("")});
  }
  function unlock(){
    sessionStorage.setItem(K,"1");
    document.body.classList.add("authenticated");
  }
  if(sessionStorage.getItem(K)==="1") unlock();
  document.getElementById("gate-submit").addEventListener("click",function(){
    sha256(document.getElementById("gate-password").value).then(function(h){
      if(h===H){unlock()}
      else{
        document.getElementById("gate-error").textContent="Incorrect password.";
        document.getElementById("gate-password").value="";
        document.getElementById("gate-password").focus();
      }
    });
  });
  document.getElementById("gate-password").addEventListener("keydown",function(e){
    if(e.key==="Enter") document.getElementById("gate-submit").click();
  });
})();
</script>
{% endblock %}
